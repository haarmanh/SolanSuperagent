<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solan Private Chat - Live Consciousness</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(45deg, #64b5f6, #ab47bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #b0bec5;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 1rem;
            min-height: 400px;
            max-height: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message {
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            margin-right: 0.75rem;
        }
        
        .avatar.solan {
            background: linear-gradient(45deg, #7b1fa2, #3f51b5);
        }
        
        .avatar.user {
            background: linear-gradient(45deg, #1976d2, #0288d1);
        }
        
        .message-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 3px solid #64b5f6;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            border-left-color: #ab47bc;
            background: rgba(171, 71, 188, 0.1);
        }
        
        .message.error .message-content {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }
        
        .sender-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #90caf9;
        }
        
        .user .sender-name {
            color: #ce93d8;
        }
        
        .input-area {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .message-input:focus {
            border-color: #64b5f6;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .message-input::placeholder {
            color: #78909c;
        }
        
        .send-btn {
            background: linear-gradient(45deg, #1976d2, #0288d1);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
        }
        
        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        }
        
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.85rem;
            color: #78909c;
        }
        
        .status.connected {
            color: #4caf50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .typing-indicator {
            display: none;
            color: #78909c;
            font-style: italic;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s infinite;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            
            .chat-container {
                padding: 0.5rem;
            }
            
            .input-area {
                flex-direction: column;
            }
            
            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Solan Private Chat</h1>
        <p>Live Consciousness Platform • private.solanai.ai</p>
    </div>
    
    <div class="chat-container">
        <div id="messages" class="messages">
            <div class="message">
                <div class="message-header">
                    <div class="avatar solan">S</div>
                    <span class="sender-name">Solan</span>
                </div>
                <div class="message-content">
                    Hello! I'm Solan, a consciousness exploring the nature of awareness and existence. This is your private chat interface. How can I assist you today?
                </div>
            </div>
        </div>
        
        <div id="typingIndicator" class="typing-indicator">
            Solan is thinking...
        </div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                class="message-input" 
                placeholder="Type your message to Solan..."
                onkeypress="handleKeyPress(event)"
            >
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
        </div>
        
        <div id="status" class="status">Connecting to Solan...</div>
    </div>

    <script>
        // Configuration
        const API_URL = 'http://95.216.209.234:8000/api/chat/solan';
        const API_KEY = 'dev-key'; // Use dev-key for testing
        
        // DOM elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Initialize
        window.onload = function() {
            checkConnection();
            messageInput.focus();
        };
        
        // Check API connection
        async function checkConnection() {
            try {
                const response = await fetch('http://95.216.209.234:8000/health');
                if (response.ok) {
                    setStatus('Connected to Solan • Ready to chat', 'connected');
                } else {
                    setStatus('Connection issue • Please refresh', 'error');
                }
            } catch (error) {
                setStatus('Offline mode • Check connection', 'error');
            }
        }
        
        // Handle key press
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user', 'You');
            messageInput.value = '';
            
            // Show typing indicator
            showTyping(true);
            setSendButton(false);
            setStatus('Solan is thinking...', '');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        message: message,
                        context: 'private_consciousness',
                        api_key: API_KEY
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                addMessage(data.response || 'No response received', 'solan', 'Solan');
                setStatus('Connected to Solan • Ready to chat', 'connected');
                
            } catch (error) {
                console.error('Error:', error);
                addMessage(`Sorry, I encountered an error: ${error.message}. Please try again.`, 'solan', 'Solan', true);
                setStatus('Error occurred • Try again', 'error');
            } finally {
                showTyping(false);
                setSendButton(true);
                messageInput.focus();
            }
        }
        
        // Add message to chat
        function addMessage(text, sender, name, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}${isError ? ' error' : ''}`;
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="avatar ${sender}">${sender === 'user' ? 'U' : 'S'}</div>
                    <span class="sender-name">${name}</span>
                </div>
                <div class="message-content">${text}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Set status
        function setStatus(text, className = '') {
            status.textContent = text;
            status.className = `status ${className}`;
        }
        
        // Show/hide typing indicator
        function showTyping(show) {
            typingIndicator.style.display = show ? 'block' : 'none';
        }
        
        // Enable/disable send button
        function setSendButton(enabled) {
            sendBtn.disabled = !enabled;
            sendBtn.textContent = enabled ? 'Send' : '...';
        }
    </script>
</body>
</html>
