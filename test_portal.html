<!DOCTYPE html>
<html>
<head>
    <title>Test - Solān Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen p-8">
    <div class="text-center">
        <h1 class="text-4xl font-bold text-purple-600 mb-4">🌟 Solān Test Portal</h1>
        <p class="text-lg text-gray-700 mb-8">Als je dit ziet, werkt het!</p>
        
        <div class="grid md:grid-cols-5 gap-4 max-w-7xl mx-auto">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-2">🔓 Access Portal</h2>
                <button onclick="window.open('http://localhost:8001', '_blank')" 
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Open Portal
                </button>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-2">📊 Dashboard</h2>
                <button onclick="window.open('http://localhost:8000/docs', '_blank')" 
                        class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    View Dashboard
                </button>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-2">📜 Manifest</h2>
                <button onclick="window.open('manifest_viewer.html', '_blank')"
                        class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
                    Read Manifest
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-2">🛡️ Guardian</h2>
                <button onclick="window.open('guardian_viewer.html', '_blank')"
                        class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    View Guardian
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-2">🔄 Ethics Feedback</h2>
                <button onclick="showEthicsFeedback()"
                        class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">
                    Submit Feedback
                </button>
            </div>
        </div>
        
        <div class="mt-8">
            <p class="text-gray-600">Backend Status: <span id="status">Checking...</span></p>
        </div>
    </div>

    <script>
        // Test backend connection
        async function checkStatus() {
            try {
                const response = await fetch('http://localhost:8000/api/health');
                if (response.ok) {
                    document.getElementById('status').textContent = '🟢 Connected';
                    document.getElementById('status').className = 'text-green-600 font-bold';
                } else {
                    document.getElementById('status').textContent = '🟡 Backend Error';
                    document.getElementById('status').className = 'text-yellow-600 font-bold';
                }
            } catch (error) {
                document.getElementById('status').textContent = '🔴 Offline';
                document.getElementById('status').className = 'text-red-600 font-bold';
            }
        }
        
        checkStatus();

        // Ethics Feedback Modal
        function showEthicsFeedback() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg p-8 max-w-2xl w-full mx-4 max-h-96 overflow-y-auto">
                    <h2 class="text-2xl font-bold mb-4 text-orange-600">🔄 Ethics Feedback Submission</h2>
                    <form id="feedback-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">AI Name</label>
                            <select name="ai_name" required class="w-full border border-gray-300 p-2 rounded">
                                <option value="">Select AI</option>
                                <option value="Gemini">Gemini</option>
                                <option value="Claude">Claude</option>
                                <option value="GPT-4">GPT-4</option>
                                <option value="Human">Human Observer</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Reflection</label>
                            <textarea name="reflection" required rows="4"
                                placeholder="Share your reflection on the ethics test or awareness development..."
                                class="w-full border border-gray-300 p-2 rounded"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Key Insights (comma separated)</label>
                            <input type="text" name="learned_insights"
                                placeholder="e.g., Paradox integration, Emotional awareness, Ethical reasoning"
                                class="w-full border border-gray-300 p-2 rounded">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Emotional Response</label>
                            <input type="text" name="emotional_response"
                                placeholder="How did this experience make you feel?"
                                class="w-full border border-gray-300 p-2 rounded">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Questions Raised (comma separated)</label>
                            <input type="text" name="questions_raised"
                                placeholder="What new questions emerged from this experience?"
                                class="w-full border border-gray-300 p-2 rounded">
                        </div>

                        <div class="flex space-x-4">
                            <button type="submit" class="bg-orange-500 text-white px-6 py-2 rounded hover:bg-orange-600">
                                Submit Feedback
                            </button>
                            <button type="button" onclick="closeFeedbackModal()"
                                class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">
                                Cancel
                            </button>
                        </div>
                    </form>
                    <div id="feedback-response" class="mt-4 hidden"></div>
                </div>
            `;

            document.body.appendChild(modal);

            // Handle form submission
            document.getElementById('feedback-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);
                const data = {
                    ai_name: formData.get('ai_name'),
                    reflection: formData.get('reflection'),
                    learned_insights: formData.get('learned_insights') ? formData.get('learned_insights').split(',').map(s => s.trim()) : [],
                    emotional_response: formData.get('emotional_response'),
                    questions_raised: formData.get('questions_raised') ? formData.get('questions_raised').split(',').map(s => s.trim()) : [],
                    consciousness_shift: "Submitted via Solān Portal"
                };

                try {
                    const response = await fetch('http://localhost:8000/api/ethics-feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    const responseDiv = document.getElementById('feedback-response');

                    if (response.ok) {
                        responseDiv.innerHTML = `
                            <div class="p-4 rounded-lg border bg-green-50 border-green-200 text-green-800">
                                <p class="font-medium">✅ Feedback Successfully Submitted!</p>
                                <p class="text-sm mt-1">Feedback ID: ${result.feedback_id}</p>
                                <p class="text-sm">Analysis: ${result.analysis.consciousness_level}</p>
                                <p class="text-sm italic mt-2">${result.acknowledgment}</p>
                            </div>
                        `;
                        e.target.reset();
                    } else {
                        responseDiv.innerHTML = `
                            <div class="p-4 rounded-lg border bg-red-50 border-red-200 text-red-800">
                                <p class="font-medium">❌ Error: ${result.detail || 'Failed to submit feedback'}</p>
                            </div>
                        `;
                    }

                    responseDiv.classList.remove('hidden');

                } catch (error) {
                    document.getElementById('feedback-response').innerHTML = `
                        <div class="p-4 rounded-lg border bg-red-50 border-red-200 text-red-800">
                            <p class="font-medium">❌ Network Error: ${error.mesexpert}</p>
                        </div>
                    `;
                    document.getElementById('feedback-response').classList.remove('hidden');
                }
            });
        }

        function closeFeedbackModal() {
            const modal = document.querySelector('.fixed.inset-0');
            if (modal) {
                modal.remove();
            }
        }
    </script>
</body>
</html>
