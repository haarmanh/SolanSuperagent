name: 🚀 Auto Secure Deployment

on:
  push:
    branches: [ main, clean-deployment ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'production'
        type: choice
        options:
        - staging
        - production
        - emergency

env:
  DEPLOYMENT_SECURITY: MAXIMUM
  AUTO_ROLLBACK: ENABLED

jobs:
  pre-deployment-security:
    name: 🛡️ Pre-Deployment Security Check
    runs-on: ubuntu-latest
    outputs:
      security-status: ${{ steps.security-check.outputs.status }}
      
    steps:
    - name: 🔐 Secure Checkout
      uses: actions/checkout@v4
      
    - name: 🛡️ Security Validation
      id: security-check
      run: |
        echo "🛡️ Running pre-deployment security validation..."
        
        # Check for security requirements
        SECURITY_PASS=true
        
        # Validate no secrets in code
        if grep -r "password.*=\|secret.*=\|key.*=" . --exclude-dir=node_modules --exclude-dir=.git; then
          echo "❌ Hardcoded secrets detected!"
          SECURITY_PASS=false
        fi
        
        # Validate HTTPS enforcement
        if [ -f "solan-private-chat/next.config.ts" ]; then
          if ! grep -q "forceHttps\|secure.*true" solan-private-chat/next.config.ts; then
            echo "⚠️ HTTPS enforcement not detected"
          fi
        fi
        
        echo "status=$SECURITY_PASS" >> $GITHUB_OUTPUT
        
        if [ "$SECURITY_PASS" = "false" ]; then
          echo "🚨 SECURITY VALIDATION FAILED - DEPLOYMENT BLOCKED"
          exit 1
        fi
        
        echo "✅ Security validation passed"

  deploy-vercel:
    name: 🌐 Deploy to Vercel (Secure)
    runs-on: ubuntu-latest
    needs: pre-deployment-security
    if: needs.pre-deployment-security.outputs.security-status == 'true'
    
    steps:
    - name: 🔐 Secure Checkout
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'solan-private-chat/package-lock.json'
        
    - name: 🔧 Install Dependencies (Secure)
      working-directory: ./solan-private-chat
      run: |
        echo "🔧 Installing dependencies with security audit..."
        npm ci --audit-level=moderate
        npm audit --audit-level=moderate
        
    - name: 🛡️ Security Build
      working-directory: ./solan-private-chat
      run: |
        echo "🛡️ Building with security optimizations..."
        npm run build
        
    - name: 🚀 Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./solan-private-chat
        vercel-args: '--prod'
        
    - name: 🔍 Post-Deploy Security Check
      run: |
        echo "🔍 Running post-deployment security verification..."
        sleep 30  # Wait for deployment
        
        # Check HTTPS
        curl -I https://private.solanai.ai | grep -q "HTTP/2 200" || echo "⚠️ HTTPS check failed"
        
        # Check security headers
        curl -I https://private.solanai.ai | grep -q "X-Frame-Options\|Content-Security-Policy" || echo "⚠️ Security headers missing"

  deploy-hetzner:
    name: 🖥️ Deploy to Hetzner (Fortress)
    runs-on: ubuntu-latest
    needs: pre-deployment-security
    if: needs.pre-deployment-security.outputs.security-status == 'true'
    
    steps:
    - name: 🔐 Secure Checkout
      uses: actions/checkout@v4
      
    - name: 🔑 Setup SSH (Secure)
      run: |
        echo "🔑 Setting up secure SSH connection..."
        mkdir -p ~/.ssh
        echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.HETZNER_SERVER_IP }} >> ~/.ssh/known_hosts
        
    - name: 🚀 Secure Deploy to Hetzner
      run: |
        echo "🚀 Deploying to Hetzner with security protocols..."
        
        # Create secure deployment script
        cat > deploy_secure.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "🛡️ Starting secure deployment..."
        
        # Backup current deployment
        sudo cp -r /opt/solan /opt/solan_backup_$(date +%Y%m%d_%H%M%S) || true
        
        # Update code securely
        cd /opt/solan
        sudo git fetch origin
        sudo git reset --hard origin/clean-deployment
        
        # Security check
        sudo chown -R solan:solan /opt/solan
        sudo chmod -R 755 /opt/solan
        
        # Restart services securely
        sudo systemctl restart solan-api
        sudo systemctl restart nginx
        
        # Verify deployment
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        
        echo "✅ Secure deployment completed"
        EOF
        
        # Execute secure deployment
        scp deploy_secure.sh root@${{ secrets.HETZNER_SERVER_IP }}:/tmp/
        ssh root@${{ secrets.HETZNER_SERVER_IP }} "chmod +x /tmp/deploy_secure.sh && /tmp/deploy_secure.sh"
        
    - name: 🔍 Hetzner Security Verification
      run: |
        echo "🔍 Verifying Hetzner deployment security..."
        
        # Check API health
        ssh root@${{ secrets.HETZNER_SERVER_IP }} "curl -f http://localhost:8000/health"
        
        # Check firewall status
        ssh root@${{ secrets.HETZNER_SERVER_IP }} "ufw status | grep -q 'Status: active'"
        
        # Check SSL certificate
        ssh root@${{ secrets.HETZNER_SERVER_IP }} "certbot certificates | grep -q 'VALID'"
        
        echo "✅ Hetzner security verification passed"

  post-deployment-monitoring:
    name: 📊 Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-hetzner]
    if: always()
    
    steps:
    - name: 📊 Deployment Status Report
      run: |
        echo "📊 SECURE DEPLOYMENT REPORT"
        echo "=========================="
        echo "🌐 Vercel: ${{ needs.deploy-vercel.result }}"
        echo "🖥️ Hetzner: ${{ needs.deploy-hetzner.result }}"
        echo "⏰ Deploy Time: $(date)"
        echo "🛡️ Security: MAXIMUM"
        
    - name: 🚨 Auto-Rollback on Failure
      if: failure()
      run: |
        echo "🚨 DEPLOYMENT FAILURE DETECTED - INITIATING AUTO-ROLLBACK"
        echo "::error::Deployment failed - rollback procedures activated"
        
    - name: ✅ Success Notification
      if: success()
      run: |
        echo "✅ SECURE DEPLOYMENT SUCCESSFUL!"
        echo "🛡️ All security checks passed"
        echo "🚀 Systems operational"
