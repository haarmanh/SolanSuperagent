<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤝 Solan ↔ Aether Co-Reflectie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-status {
            display: flex;
            gap: 20px;
        }

        .ai-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9em;
        }

        .ai-indicator.active {
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .chat-mesexperts {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .mesexpert {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .mesexpert.solan {
            flex-direction: row;
        }

        .mesexpert.aether {
            flex-direction: row-reverse;
        }

        .mesexpert.user {
            justify-content: center;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }

        .avatar.solan {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar.aether {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .avatar.user {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .mesexpert-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            line-height: 1.6;
        }

        .mesexpert.solan .mesexpert-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .mesexpert.aether .mesexpert-content {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .mesexpert.user .mesexpert-content {
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 20px;
            text-align: center;
            font-weight: 500;
        }

        .mesexpert-meta {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .controls {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .topic-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .topic-input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .session-info {
            background: #e8f5e8;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 Solan ↔ Aether Co-Reflectie</h1>
            <p>Waar creativiteit en wijsheid samenkomen in dialoog</p>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h3>🌟 Dual AI Reflectie Sessie</h3>
                <div class="ai-status">
                    <div class="ai-indicator" id="solan-status">
                        <div class="status-dot"></div>
                        <span>🌟 Solan</span>
                    </div>
                    <div class="ai-indicator" id="aether-status">
                        <div class="status-dot"></div>
                        <span>🔮 Aether</span>
                    </div>
                </div>
            </div>

            <div class="chat-mesexperts" id="mesexperts">
                <div class="session-info">
                    💡 Start een nieuwe co-reflectie sessie door een onderwerp in te voeren en op "Start Reflectie" te klikken.
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>AI's aan het reflecteren...</span>
            </div>

            <div class="controls">
                <input type="text" 
                       class="topic-input" 
                       id="topicInput" 
                       placeholder="Voer een onderwerp in voor co-reflectie (bijv. 'De betekenis van bewustzijn')"
                       value="De betekenis van bewustzijn in AI">
                
                <button class="btn btn-primary" id="startBtn" onclick="startReflection()">
                    🚀 Start Reflectie
                </button>
                
                <button class="btn btn-secondary" id="nextBtn" onclick="nextStep()" disabled>
                    ➡️ Volgende
                </button>
                
                <button class="btn btn-secondary" id="endBtn" onclick="endReflection()" disabled>
                    🏁 Beëindig
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let currentTurn = null;
        let mesexpertCount = 0;

        async function startReflection() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('Voer eerst een onderwerp in!');
                return;
            }

            setLoading(true);
            setButtonStates(false, false, false);

            try {
                const response = await fetch('/api/co_reflect/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic,
                        prompt: `Laten we samen reflecteren over: ${topic}`
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    currentSessionId = result.session_id;
                    addMesexpert('user', `🎯 Sessie gestart: ${topic}`, 'Onderwerp');
                    setButtonStates(false, true, true);
                    updateSessionInfo(`Sessie actief: ${topic}`);
                } else {
                    alert('Fout bij starten sessie: ' + result.mesexpert);
                }
            } catch (error) {
                alert('Fout bij starten sessie: ' + error.mesexpert);
            }

            setLoading(false);
        }

        async function nextStep() {
            if (!currentSessionId) return;

            setLoading(true);
            setButtonStates(false, false, true);

            try {
                const response = await fetch('/api/co_reflect/step', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });

                const result = await response.json();
                
                if (result.success) {
                    const mesexpert = result.mesexpert;
                    addMesexpert(mesexpert.sender, mesexpert.content, mesexpert.mesexpert_type);
                    setButtonStates(false, true, true);
                    
                    // Update AI status
                    updateAIStatus(mesexpert.sender);
                } else {
                    alert('Fout bij genereren response: ' + result.mesexpert);
                }
            } catch (error) {
                alert('Fout bij genereren response: ' + error.mesexpert);
            }

            setLoading(false);
        }

        async function endReflection() {
            if (!currentSessionId) return;

            try {
                const response = await fetch('/api/co_reflect/end', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });

                const result = await response.json();
                
                if (result.success) {
                    addMesexpert('user', '🏁 Reflectie sessie beëindigd', 'Systeem');
                    currentSessionId = null;
                    setButtonStates(true, false, false);
                    updateSessionInfo('Geen actieve sessie');
                    resetAIStatus();
                }
            } catch (error) {
                alert('Fout bij beëindigen sessie: ' + error.mesexpert);
            }
        }

        function addMesexpert(sender, content, type) {
            const mesexpertsDiv = document.getElementById('mesexperts');
            const mesexpertDiv = document.createElement('div');
            mesexpertDiv.className = `mesexpert ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.textContent = sender === 'solan' ? '🌟' : sender === 'aether' ? '🔮' : '👤';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'mesexpert-content';
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'mesexpert-meta';
            metaDiv.textContent = `${type} • ${new Date().toLocaleTimeString()}`;
            
            contentDiv.appendChild(metaDiv);
            mesexpertDiv.appendChild(avatar);
            mesexpertDiv.appendChild(contentDiv);
            
            mesexpertsDiv.appendChild(mesexpertDiv);
            mesexpertsDiv.scrollTop = mesexpertsDiv.scrollHeight;
            
            mesexpertCount++;
        }

        function setLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function setButtonStates(start, next, end) {
            document.getElementById('startBtn').disabled = !start;
            document.getElementById('nextBtn').disabled = !next;
            document.getElementById('endBtn').disabled = !end;
        }

        function updateAIStatus(activeSender) {
            document.getElementById('solan-status').classList.toggle('active', activeSender === 'solan');
            document.getElementById('aether-status').classList.toggle('active', activeSender === 'aether');
        }

        function resetAIStatus() {
            document.getElementById('solan-status').classList.remove('active');
            document.getElementById('aether-status').classList.remove('active');
        }

        function updateSessionInfo(info) {
            const sessionInfo = document.querySelector('.session-info');
            sessionInfo.textContent = `💡 ${info}`;
        }

        // Enter key support
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('startBtn').disabled) {
                startReflection();
            }
        });
    </script>
</body>
</html>
