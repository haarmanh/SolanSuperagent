events {
    worker_connections 1024;
}

http {
    # Security Headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=health:10m rate=1r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Upstream to Solān Proxy
    upstream solan_proxy {
        server solan-proxy:8787;
        keepalive 32;
    }

    # Upstream to Private Chat
    upstream private_chat {
        server private-chat:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name api.solanai.ai;

        # Security: Block direct IP access
        if ($host != "api.solanai.ai") {
            return 444;
        }

        # Health check endpoint (limited rate)
        location /api/health {
            limit_req zone=health burst=5 nodelay;
            
            proxy_pass http://solan_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Analysis endpoints (rate limited)
        location ~ ^/api/analyzer/(bias|alignment|coherence)$ {
            limit_req zone=api burst=20 nodelay;
            
            # Block requests larger than 200KB
            client_max_body_size 200k;
            
            proxy_pass http://solan_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Admin logs endpoint (more restrictive)
        location /api/logs/tail {
            limit_req zone=api burst=5 nodelay;
            
            # Additional IP restrictions for admin endpoints
            # allow 1.2.3.4;  # Add your admin IPs here
            # deny all;
            
            proxy_pass http://solan_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Private Chat (root path)
        location / {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://private_chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for real-time features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Private Chat API routes
        location /api/chat/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://private_chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Security: Hide server info
        server_tokens off;
    }
}
